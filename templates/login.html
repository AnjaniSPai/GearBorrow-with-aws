<!DOCTYPE html>
<html lang="en">
<head>
    <title>GearBorrow | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(rgba(11, 12, 16, 0.85), rgba(11, 12, 16, 0.85)), url('/static/bg1.jpeg') no-repeat center center fixed; background-size: cover; }
        .auth-box { width: 320px; padding: 40px; background: rgba(31, 40, 51, 0.7); border-radius: 12px; border: 1px solid #66fcf1; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(102, 252, 241, 0.2); }
        h2 { font-family: 'Rajdhani', sans-serif; color: #66fcf1; font-size: 2rem; margin-top: 0; text-align: center; letter-spacing: 2px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #45a29e; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(11, 12, 16, 0.8); border: 1px solid #45a29e; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: transparent; color: #66fcf1; border: 2px solid #66fcf1; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #66fcf1; color: #0b0c10; box-shadow: 0 0 15px rgba(102, 252, 241, 0.5); }
        .link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .link a { color: #c026d3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>Player Login</h2>
        <form action="/login" method="POST">
            <label>Email ID</label>
            <input type="email" name="email" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit">Initialize</button>
        </form>
        <div class="link">Need an account? <a href="/signup_page">Create Profile</a></div>
    </div>
</body>
</html>
