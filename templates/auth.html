<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearBorrow | Player Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10; 
            background-image: radial-gradient(circle at 50% 0%, #1f2833 0%, #0b0c10 70%);
            color: #c5c6c7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            display: flex;
            gap: 40px;
            background: rgba(31, 40, 51, 0.4);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1f2833;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.05);
            backdrop-filter: blur(10px);
        }

        .auth-box {
            width: 300px;
            padding: 30px;
            background: #1f2833;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .auth-box:hover {
            border-color: #66fcf1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
            transform: translateY(-5px);
        }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            color: #66fcf1;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #45a29e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0b0c10;
            border: 1px solid #45a29e;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: border 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #66fcf1;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
        }

        .btn-signup {
            border-color: #c026d3; 
            color: #c026d3;
        }

        .btn-signup:hover {
            background: #c026d3;
            color: white;
            box-shadow: 0 0 15px rgba(192, 38, 211, 0.5);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Player Login</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="email" required placeholder="player@gearborrow.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit">Initialize</button>
            </form>
        </div>

        <div class="auth-box">
            <h2 style="color: #c026d3;">New Account</h2>
            <form action="/signup" method="POST">
                <div class="form-group">
                    <label style="color: #c026d3;">Username</label>
                    <input type="text" name="username" required placeholder="GamerTag">
                </div>
                <div class="form-group">
                    <label style="color: #c026d3;">Email ID</label>
                    <input type="email" name="email" required placeholder="newplayer@gearborrow.com">
                </div>
                <div class="form-group">
                    <label style="color: #c026d3;">Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-signup">Create Profile</button>
            </form>
        </div>
    </div>

</body>
</html>
