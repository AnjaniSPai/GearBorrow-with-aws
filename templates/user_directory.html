<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Registry | GearBorrow Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .hud-bar { background: rgba(22, 27, 34, 0.9); border-bottom: 2px solid #ff7b00; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .hud-title { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; color: #ff7b00; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; border: 1px solid #30363d; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #ff7b00; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
        .btn-back { color: #58a6ff; text-decoration: none; border: 1px solid #58a6ff; padding: 8px 15px; border-radius: 4px; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; font-weight: bold;}
    </style>
</head>
<body>
    <div class="hud-bar">
        <h1 class="hud-title">👤 User Registry</h1>
        <a href="/admin" class="btn-back">← Back to Command Center</a>
    </div>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email Address</th>
                    <th>Phone / Contact</th>
                    <th>Access Role</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td style="color: #ff7b00; font-weight: bold;">{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone if user.phone else 'Not Provided' }}</td>
                    <td style="text-transform: capitalize;">{{ user.role }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
