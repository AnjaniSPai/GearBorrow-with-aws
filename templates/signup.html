<!DOCTYPE html>
<html lang="en">
<head>
    <title>GearBorrow | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(rgba(11, 12, 16, 0.85), rgba(11, 12, 16, 0.85)), url('/static/bg1.jpeg') no-repeat center center fixed; background-size: cover; }
        .auth-box { width: 320px; padding: 40px; background: rgba(31, 40, 51, 0.7); border-radius: 12px; border: 1px solid #c026d3; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(192, 38, 211, 0.2); }
        h2 { font-family: 'Rajdhani', sans-serif; color: #c026d3; font-size: 2rem; margin-top: 0; text-align: center; letter-spacing: 2px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #c026d3; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(11, 12, 16, 0.8); border: 1px solid #c026d3; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: transparent; color: #c026d3; border: 2px solid #c026d3; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c026d3; color: white; box-shadow: 0 0 15px rgba(192, 38, 211, 0.5); }
        .link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .link a { color: #66fcf1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>New Account</h2>
        <form action="/signup" method="POST">
            <label>Username</label>
            <input type="text" name="username" required>
            <label>Email ID</label>
            <input type="email" name="email" required>
            <label>Password</label>
            <input type="password" name="password" required>
            <label>Contact Number</label>
            <input type="tel" name="phone" required>
            <button type="submit">Create Profile</button>
        </form>
        <div class="link">Already a member? <a href="/login_page">Login Here</a></div>
    </div>
</body>
</html>
